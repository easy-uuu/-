<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>질문</title>
<style>
body{
    text-align:center;
    font-family:Arial;
    margin-top:100px;
}

button {
    font-size: 24px;      /* 버튼 글자 크기 */
    padding: 15px 40px;   /* 버튼 위아래, 좌우 크기 */
    margin: 0 30px;       /* 버튼 사이 좌우 간격 */
    cursor: pointer;
    border-radius: 10px;
    border: none;
    background-color: #ff4081;
    color: white;
    transition: background-color 0.3s ease;
}

button:hover {
    background-color: #e040fb;
}

#no{
    position:absolute;
}

#result{
    display:none;
    margin-top:30px;
}
</style>
</head>

<body>

<h1>나랑 사귈래? ❤️</h1>

<button onclick="yes()">예</button>
<button id="no" onmouseover="move()">아니오</button>

<div id="result">
    <h2>❤️ 고마워!! ❤️</h2>
    <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif" width="300">
</div>

<script>
function move(){
    let x = Math.random() * window.innerWidth - 100;
    let y = Math.random() * window.innerHeight - 50;

    let btn = document.getElementById("no");
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function yes(){
    document.getElementById("result").style.display="block";
}
</script>

</body>

</html>
